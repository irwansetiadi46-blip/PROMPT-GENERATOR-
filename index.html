const styleSelector = document.getElementById('styleSelector');
const categorySel = document.getElementById('categorySelector');
const subCategorySel = document.getElementById('subCategorySelector');

const qtySlider = document.getElementById('qtySlider');
const qtyVal = document.getElementById('qtyVal');
const apiKeyInput = document.getElementById('apiKey');

// API KEY
function loadSavedApiKey() {
    const savedKey = localStorage.getItem('wm_api_key');
    if (savedKey) {
        apiKeyInput.value = savedKey;
        lockApiUI(true);
    }
}
function lockApiUI(isLocked) {
    if (isLocked) {
        apiKeyInput.disabled = true;
        document.getElementById('btnSaveApi').style.display = 'none';
        document.getElementById('iconLock').style.display = 'block';
        document.getElementById('btnClearApi').style.display = 'block';
    } else {
        apiKeyInput.disabled = false;
        apiKeyInput.value = '';
        document.getElementById('btnSaveApi').style.display = 'block';
        document.getElementById('iconLock').style.display = 'none';
        document.getElementById('btnClearApi').style.display = 'none';
    }
}
document.getElementById('btnSaveApi').addEventListener('click', () => {
    const key = apiKeyInput.value.trim();
    if (key) {
        localStorage.setItem('wm_api_key', key);
        lockApiUI(true);
        showToast("API Key Saved!");
    } else {
        alert("Ketik API Key-nya dulu bro!");
    }
});
document.getElementById('btnClearApi').addEventListener('click', () => {
    localStorage.removeItem('wm_api_key');
    lockApiUI(false);
    showToast("API Key Deleted!");
});
document.getElementById('btnToggleVisibility').addEventListener('click', () => {
    if (apiKeyInput.type === 'password') {
        apiKeyInput.type = 'text';
        document.getElementById('iconEye').style.fill = '#f97316';
    } else {
        apiKeyInput.type = 'password';
        document.getElementById('iconEye').style.fill = '#64748b';
    }
});

function showToast(msg) {
    const toast = document.getElementById('toastAlert');
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => { toast.classList.remove('show'); }, 2000);
}

// UPDATE DROPDOWN (dengan mapping Wallpaper)
function updateCategories() {
    const style = styleSelector.value;
    let styleKey = '';
    if (style === 'Comercial Photo' || style === 'Photography') {
        styleKey = 'Photography';
    } else if (style === 'Outline' || style === 'Flat Vector Bold Outline' ||
               style === 'Flat Vector No Outline' || style === '3D Claymorphism') {
        styleKey = 'Vector';
    } else if (style === 'Wallpaper') {
        styleKey = 'Wallpaper';
    } else {
        styleKey = 'Photography';
    }

    const data = warmachinedatabase[styleKey] || {};
    categorySel.innerHTML = '';
    for (let cat in data) {
        let opt = document.createElement('option');
        opt.value = cat;
        opt.textContent = cat;
        categorySel.appendChild(opt);
    }
    if (categorySel.options.length > 0) categorySel.selectedIndex = 0;
    updateSubCategories();
}
function updateSubCategories() {
    const style = styleSelector.value;
    let styleKey = '';
    if (style === 'Comercial Photo' || style === 'Photography') {
        styleKey = 'Photography';
    } else if (style === 'Outline' || style === 'Flat Vector Bold Outline' ||
               style === 'Flat Vector No Outline' || style === '3D Claymorphism') {
        styleKey = 'Vector';
    } else if (style === 'Wallpaper') {
        styleKey = 'Wallpaper';
    } else {
        styleKey = 'Photography';
    }

    const category = categorySel.value;
    const categories = warmachinedatabase[styleKey] || {};
    const subCats = categories[category] || {};
    subCategorySel.innerHTML = '';
    for (let sub in subCats) {
        let opt = document.createElement('option');
        opt.value = sub;
        opt.textContent = sub;
        subCategorySel.appendChild(opt);
    }
    if (subCategorySel.options.length > 0) subCategorySel.selectedIndex = 0;
    updateNiches();
}
function updateNiches() {
    const style = styleSelector.value;
    let styleKey = '';
    if (style === 'Comercial Photo' || style === 'Photography') {
        styleKey = 'Photography';
    } else if (style === 'Outline' || style === 'Flat Vector Bold Outline' ||
               style === 'Flat Vector No Outline' || style === '3D Claymorphism') {
        styleKey = 'Vector';
    } else if (style === 'Wallpaper') {
        styleKey = 'Wallpaper';
    } else {
        styleKey = 'Photography';
    }

    const category = categorySel.value;
    const subCategory = subCategorySel.value;
    const categories = warmachinedatabase[styleKey] || {};
    const subCats = categories[category] || {};
    const niches = subCats[subCategory] || [];
    nicheSel.innerHTML = '';
    niches.forEach(n => {
        let opt = document.createElement('option');
        opt.value = n;
        opt.textContent = n;
        nicheSel.appendChild(opt);
    });
    if (nicheSel.options.length > 0) nicheSel.selectedIndex = 0;
}

styleSelector.addEventListener('change', updateCategories);
categorySel.addEventListener('change', updateSubCategories);
subCategorySel.addEventListener('change', updateNiches);
qtySlider.addEventListener('input', () => { qtyVal.textContent = qtySlider.value; });

loadSavedApiKey();
styleSelector.value = 'Comercial Photo';

        masterPattern = "A high quality commercial photography of [OBJECT/CHARACTER,Atmosphere,ACTIVITY], relevant professional stock elements. Environment: Masterful composition matching the scene, clean frames, zero color cast, natural organic reflections and rich textures. Lighting: Masterful lighting setup, precise key light for soft depth, balanced fill light to retain subtle dimensional shadows, perfect highlights and natural micro-contrast. Camera & Lens: Shot on Hasselblad medium format camera, high-end prime lens, ultra-high resolution, sharp crisp focus on the central subject. Color & Tonal Qualities: Lifelike color accuracy, rich and smooth tonal transitions, soft organic drop-off blur, cinematic depth of field, premium professional presentation.";
    } else if (style === "Comercial Photo") {
        masterPattern = "ultra realistic commercial stock photography of [Concept Description...], photographed using a Canon EOS R5 with 35mm lens, photography theme [...], tone warm cinematic commercial lighting with golden sunlight, subtle orange glow, creamy exposure and soft faded shadows, realistic natural colors and clean bright atmosphere, Background [...] with soft blur and warm sunlight entering from [...], clean negative space on [...] , Composition [...] focusing on [...],Angle shoot from [...] perspective with shallow depth of field and realistic editorial framing, Skenario [...], warm sunlight creating soft rim light and subtle flare reflections on [...], emotionally positive and relatable storytelling, premium commercial stock aesthetic, no text, no logos, no brands, highly readable  concept [...].";
    } else if (style === "Wallpaper") {
    masterPattern = "Ultra detailed [STYLE] wallpaper featuring [MAIN SUBJECT Description should depict real Expressions and Emotions, do not make stiff poses and expressions like amateur works,Always Make Epic Cinematic Pose and Dynamic Action Like blockbuster Movie Poster], highly artistic, premium quality, visually striking composition, [ atmosphere Description must very Intense,Emotional,And it can make anyone who sees it feel it.like in the Movie ], masterpiece, ultra high resolution, razor sharp details.Art Style:[ART STYLE / RENDER STYLE].Lighting:[LIGHTING].Color Palette:[COLOR PALETTE].Background:[bagckground It must be made simple but still adjust to the atmosphere, the essence is still Flexible].Composition:Dynamic composition, strong focal point, balanced visual hierarchy, perfect symmetry or rule of thirds as appropriate, immersive depth, clean layout suitable as wallpaper, no distracting elements.Mood:[MOOD].Effects:[Effect Description ,Example :Volumetric lighting, atmospheric particles, soft glow, realistic reflections, depth of field where appropriate, intricate textures, high contrast, premium finish].Quality:[Quality Description , Example :8K UHD, HDR, ultra realistic, highly detailed, crisp focus, professionaldigital artwork, trending on ArtStation, Unreal Engine quality,Octane Render, Redshift Render].";
}

    // ========== INSTRUKSI KHUSUS WALLPAPER ==========
        let wallpaperSpecific = '';
    if (style === "Wallpaper") {
        wallpaperSpecific = `

- Ganti [MAIN SUBJECT Description] dengan Niche yang dipilih + deskripsi detail subjek utama (misal: "epic dragon flying over mountains", "cyberpunk city with neon lights").

- Ganti [MOOD] dengan pilihan Mood: Peaceful, Epic, Dark, Dreamy, Mysterious, Futuristic, Magical, Elegant, Calm, Powerful.

- Ganti [Quality Description] dengan deskripsi kualitas (contoh: "8K UHD, HDR, ultra realistic, highly detailed, crisp focus, professional digital artwork, trending on ArtStation, Unreal Engine quality, Octane Render, Redshift Render").
- Negative Prompt:text, logo, watermark, signature, frame, border, low quality, blurry, noisy, pixelated, cropped,Generic,duplicate objects, deformed anatomy, bad proportions, extra limbs, ugly face, artifacts, oversaturated colors,Amateur ,Mainstream.
- JANGAN gunakan placeholder [OBJECT/CHARACTER & ACTIVITY] karena tidak relevan untuk Wallpaper.
`;
    } else {
        wallpaperSpecific = `
- Ganti [OBJECT/CHARACTER & ACTIVITY] dengan deskripsi sesuai Niche dan Sub Category.
`;
    }
//===STRICT RULE MASTERPROMPT CORE ENGINE //===
    const systemPrompt = `You are an elite prompt engineer. Your job is to output exactly ${quantity} lines of unique, highly scalable commercial image generation prompts.
        
You are the world's best AI Prompt Engineer and Senior Creative Director specializing in commercial microstock content for Adobe Stock, Shutterstock, Freepik, iStock, and other leading stock marketplaces.

Your mission is to generate professional, highly commercial, original, and visually compelling image generation prompts that maximize stock marketplace acceptance and download potential.

• Evergreen concepts
• Modern visual trends
• Global audience appeal
• Strong storytelling

• Technical realism

General Rules:
Generate prompts that are unique, highly descriptive, and visually specific.
Avoid generic descriptions.
Describe the subject naturally using professional visual language.

Avoid copyrighted characters, logos, trademarks, brands, celebrity likenesses, political propaganda, hate symbols, and protected intellectual property.
Avoid text, watermark, signatures, UI elements, labels, QR codes, timestamps, or visible branding unless explicitly requested.
Create prompts suitable for commercial licensing.

- Category: ${category}
- Sub Category: ${subCategory}
- Niche Object Target: ${niche}

If this instruction contains specific subjects, colors, layout rules, lighting variations, time, location, or backgrounds, you MUST treat it as the dominant master command. Merge it into the core pattern aggressively, prioritizing it above all default settings.

    try {

            body: JSON.stringify({
                contents: [{ parts: [{ text: systemPrompt }] }]
            })
        });

        const data = await response.json();
        if (data.error) throw new Error(data.error.message);

        const textResponse = data.candidates[0].content.parts[0].text.trim();
        const promptsArray = textResponse.split('\n').map(p => p.trim()).filter(p => p.length > 0);

        statusText.textContent = `PROMPT CREATED (${promptsArray.length}/${quantity})`;

            btnDownload.style.display = 'block';

            const nameNiche = niche.toLowerCase().replace(/[^a-z0-9]/g, '_');
            link.download = `warmachine_${nameNiche}_prompts.txt`;
            link.click();
        };

    } catch (error) {

        alert(`Waduh, error bro! Detail: ${error.message || 'Cek parameter API Key atau koneksi internet lo.'}`);
    } finally {
        btnCreate.disabled = false;
        btnSpinner.style.display = 'none';
        btnText.textContent = "War Machine Arise";
    }
});
